<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title></title>
		<script src="js/vue.js"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"
			integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous">
		</script>
		<script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"
			integrity="sha384-nvAa0+6Qg9clwYCGGPpDQLVpLNn0fRaROjHqs13t4Ggj3Ez50XnGQqc/r8MhnRDZ" crossorigin="anonymous">
		</script>
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
			integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
		<link rel="stylesheet" href="/myweb/css/h1.css" />
		<style type="text/css">
			/* 桌面端默认样式 */
			/* 桌面端默认样式 */
			body {
			    background-image: url('/myweb/a4.png');
			    background-size: cover;
			    background-position: center;
			    background-repeat: no-repeat;
			    background-attachment: fixed;
			    min-height: 100vh;
			    margin: 0;
			}
			
			/* 移动端样式 - 单独写一个媒体查询 */
			@media (max-width: 768px) {
			    body {
			        background-attachment: scroll;
			        /* 如果需要更换背景图片才取消注释下面这行 */
			        /* background-image: url('mobile-bg.jpg'); */
			    }
			}
			 * {
			            margin: 0;
			            padding: 0;
			            box-sizing: border-box;
			        }
			        
			        
			        
			        .container {
			            width: 100%;
			            max-width: 1200px;
			            padding: 30px;
			        }
			        
			        .title {
			            text-align: center;
			            color: white;
			            margin-bottom: 40px;
			            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
			        }
			        
			        .title h1 {
			            font-size: 3.5rem;
			            margin-bottom: 10px;
			        }
			        
			        .title p {
			            opacity: 0.9;
			            font-size: 1.1rem;
			        }
			        
			        /* 7列栅格系统 - 核心样式 */
			        .grid-container {
			            display: grid;
			            grid-template-columns: repeat(7, 1fr);
			            gap: 20px;
			            margin-bottom: 40px;
			        }
			        
			        /* 响应式布局 */
			        @media (max-width: 1200px) {
			            .grid-container {
			                grid-template-columns: repeat(4, 1fr);
			            }
			        }
			        
			        @media (max-width: 768px) {
			            .grid-container {
			                grid-template-columns: repeat(2, 1fr);
			            }
			        }
			        
			        @media (max-width: 480px) {
			            .grid-container {
			                grid-template-columns: 1fr;
			            }
			        }
			        
			        /* 栅格列样式 */
			        .grid-column {
			            background: rgba(255, 255, 255, 0.95);
			            border-radius: 15px;
			            padding: 25px 15px;
			            text-align: center;
			            transition: all 0.3s ease;
			            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
			            display: flex;
			            flex-direction: column;
			            align-items: center;
			            justify-content: center;
			            min-height: 180px;
			        }
			        
			        .grid-column:hover {
			            transform: translateY(-10px);
			            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
			            background: white;
			        }
			        
			        .column-number {
			            width: 40px;
			            height: 40px;
			            background: linear-gradient(45deg, #667eea, #764ba2);
			            color: white;
			            border-radius: 50%;
			            display: flex;
			            align-items: center;
			            justify-content: center;
			            font-weight: bold;
			            font-size: 1.2rem;
			            margin-bottom: 15px;
			            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
			        }
			        
			        .column-title {
			            font-size: 2rem;
			            color: #333;
			            margin-bottom: 15px;
			            font-weight: 600;
			        }
			        
			        /* 按钮样式 */
			        .grid-button {
			            background: linear-gradient(45deg, #667eea, #764ba2);
			            color: white;
			            border: none;
			            padding: 10px 20px;
			            border-radius: 25px;
			            font-size: 0.9rem;
			            font-weight: 600;
			            cursor: pointer;
			            transition: all 0.3s ease;
			            width: 80%;
			            max-width: 140px;
			            letter-spacing: 0.5px;
			            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
			        }
			        
			        .grid-button:hover {
			            transform: scale(1.05);
			            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
			            background: linear-gradient(45deg, #764ba2, #667eea);
			        }
			        
			        .grid-button:active {
			            transform: scale(0.98);
			        }
			        
			        /* 底部说明 */
			        .footer {
			            text-align: center;
			            color: white;
			            margin-top: 30px;
			            padding: 20px;
			            background: rgba(255, 255, 255, 0.1);
			            border-radius: 10px;
			            backdrop-filter: blur(10px);
			        }
		</style>
	</head>
	<body>
		 <div class="container">
		        <div class="title">
		            <h1>请选择学习模块</h1>
		            
		        </div>
		        
		        <div class="grid-container" id="gridContainer">
		            <!-- 7个列将通过JavaScript动态生成 -->
		        </div>
		        
		       
		    </div>
		
		    <script>
		        // 7列的数据 - 添加page属性
		        const columns = [
		            { title: '回顾复习', color: '#667eea', page: 'review.html' },
		            { title: '导入新课', color: '#764ba2', page: 'new class.html' },
		            { title: '学习目标', color: '#f093fb', page: 'goals.html' },
		            { title: '学习任务一', color: '#4facfe', page: 'task1.html' },
		            { title: '学习任务二', color: '#00f2fe', page: 'task2.html' },
		            { title: '实践训练', color: '#43e97b', page: 'practice.html' },
		            { title: '课堂总结', color: '#fa709a', page: 'summary.html' }
		        ];
		        
		        const gridContainer = document.getElementById('gridContainer');
		        const selectedColumnSpan = document.getElementById('selectedColumn');
		        
		        // 生成7列
		        columns.forEach((column, index) => {
		            const columnDiv = document.createElement('div');
		            columnDiv.className = 'grid-column';
		            
		            // 添加data-page属性
		            columnDiv.innerHTML = `
		                <div class="column-number">${index + 1}</div>
		                <div class="column-title">${column.title}</div>
		                <button class="grid-button" data-column="${index + 1}" data-page="${column.page}">
		                    点击进入
		                </button>
		            `;
		            
		            gridContainer.appendChild(columnDiv);
		        });
		        
		        // 为所有按钮添加点击事件
		        document.querySelectorAll('.grid-button').forEach(button => {
		            button.addEventListener('click', function() {
		                const columnNum = this.getAttribute('data-column');
		                const pageFile = this.getAttribute('data-page');
		                
		                // 可选：如果有显示区域，可以显示跳转信息
		                console.log(`正在跳转到: 第${columnNum}列 - ${pageFile}`);
		                
		                // 添加点击效果
		                this.style.transform = 'scale(0.95)';
		                this.style.background = `linear-gradient(45deg, ${columns[columnNum - 1].color}, #333)`;
		                this.textContent = '跳转中...';
		                this.disabled = true;
		    
		                // 延迟跳转，让用户看到效果
		                setTimeout(() => {
		                    window.location.href = pageFile;
		                }, 500);
		            });
		        });
		        
		        // 添加键盘快捷键支持
		        document.addEventListener('keydown', (event) => {
		            const key = event.key;
		            if (key >= '1' && key <= '7') {
		                const columnIndex = parseInt(key) - 1;
		                const button = document.querySelector(`.grid-button[data-column="${key}"]`);
		                if (button) {
		                    button.click();
		                }
		            }
		        });

		    </script>
	</body>
</html>
